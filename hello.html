<head>

    <title>训练网页</title>
    <style>
        body
        {
            background-image: url(./1680747969971_1a409513.jpg);

        }
        p
        {
            font-size: 15px;

<body>
    <button onclick="logout()">退出登录</button>
    <script>
        // 页面加载时检查登录状态
        if (!localStorage.getItem('loggedIn')) {
            // 未登录则跳回登录页
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('loggedIn');
            window.location.href = 'index.html';
        }
    </script>
