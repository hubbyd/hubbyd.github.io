<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>创造之境 · 前端成长日志</title>
    <!-- 引入优雅字体 & 微交互平滑 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 优化背景：保留原图意境，增强层次感与可读性 */
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.25)),
                url('./fccd46ce1656f5eab3962bd6fe31663767c89a5b7eece-M3OyhZ_fw658.webp');
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            backdrop-filter: brightness(0.96);
        }

        /* 主卡片 - 毛玻璃质感 + 现代设计 */
        .hero-card {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.3);
            padding: 2.5rem 2rem 3rem;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeSlideUp 0.65s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .hero-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 32px 60px -16px rgba(0, 0, 0, 0.4);
            background: rgba(255, 255, 255, 0.96);
        }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 标题区域 - 更富细节 */
        .title-wrapper {
            margin-bottom: 1.2rem;
        }

        .main-title {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #2C3E50, #E67E22, #D35400);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .accent-badge {
            display: inline-block;
            background: rgba(240, 107, 31, 0.15);
            backdrop-filter: blur(4px);
            padding: 0.2rem 1rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #d35400;
            margin-top: 0.25rem;
            letter-spacing: 0.3px;
        }

        /* 描述文案 */
        .description {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #2c3e4e;
            margin: 1.8rem 0 1rem;
            font-weight: 450;
            max-width: 550px;
            margin-left: auto;
            margin-right: auto;
            background: rgba(255, 248, 235, 0.5);
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .highlight {
            font-weight: 600;
            color: #e67e22;
            border-bottom: 1px dashed #e67e22;
        }

        /* 动态装饰元素 */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255, 255, 240, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.4rem 1rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #5a3e2b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-icon {
            font-size: 1.1rem;
        }

        /* CTA 按钮 - 升级交互 */
        .cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(105deg, #f06b1f 0%, #e05a10 100%);
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 0.9rem 2.4rem;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(240, 107, 31, 0.35);
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            margin-top: 0.8rem;
        }

        .cta-btn:hover {
            background: linear-gradient(105deg, #e05f16, #c74e08);
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(240, 107, 31, 0.45);
            gap: 16px;
        }

        .cta-btn:active {
            transform: scale(0.98);
        }

        .arrow-icon {
            transition: transform 0.2s;
            font-size: 1.2rem;
        }

        .cta-btn:hover .arrow-icon {
            transform: translateX(5px);
        }

        /* 脚注 & 社交氛围 */
        .footer-note {
            margin-top: 2.8rem;
            font-size: 0.75rem;
            color: #6c7a89;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            padding-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .footer-note span {
            opacity: 0.7;
        }

        .meta-link {
            color: #e67e22;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .meta-link:hover {
            color: #b94b00;
            text-decoration: underline;
        }

        /* 响应式调整 */
        @media (max-width: 580px) {
            .hero-card {
                padding: 1.8rem 1.2rem 2.2rem;
            }

            .main-title {
                font-size: 2.2rem;
            }

            .description {
                font-size: 1rem;
                padding: 0.6rem 1rem;
            }

            .cta-btn {
                font-size: 1rem;
                padding: 0.7rem 1.8rem;
            }

            .stats-row {
                gap: 1rem;
            }

            .stat-item {
                font-size: 0.7rem;
                padding: 0.2rem 0.8rem;
            }
        }

        /* 背景图加载失败时的优雅降级 */
        @media (max-width: 600px) {
            body {
                background: linear-gradient(125deg, #f9f3e7, #ffe6d5);
            }
        }
    </style>
</head>

<body>
    <div class="hero-card">
        <div class="title-wrapper">
            <h1 class="main-title">让创造产生价值</h1>
            <div class="accent-badge">✨ 灵感 · 沉淀 · 成长 ✨</div>
        </div>

        <p class="description">
            🌱 欢迎来到我的<span class="highlight">撰写·成长栈</span><br>
            这是一个前端初学者的日常学习记录，记录代码路上的每一次突破与思考。<br>
            期待与你<span class="highlight">交流经验、分享灵感</span>，一同进步。
        </p>

        <!-- 趣味微数据 - 增加真实感和活力 -->
        <div class="stats-row">
            <div class="stat-item">
                <span class="stat-icon">📘</span> 持续学习
            </div>
            <div class="stat-item">
                <span class="stat-icon">⚡</span> 每日更新
            </div>
            <div class="stat-item">
                <span class="stat-icon">🤝</span> 开放共建
            </div>
        </div>

        <!-- 核心按钮：进入网站 -->
        <a href="login.html" class="cta-btn" id="enterBtn">
            <span>探索空间</span>
            <span class="arrow-icon">→</span>
        </a>

        <div class="footer-note">
            <span>✍️ 从零到一 · 前端日志</span>
            <a href="#" class="meta-link" id="shareTip">💬 留下足迹</a>
            <span>📅 第 42 篇笔记</span>
        </div>
    </div>

    <script>
        // 增强交互：轻提醒 + 控制台友好，并确保进入按钮的平滑行为
        const enterButton = document.getElementById('enterBtn');
        const shareTip = document.getElementById('shareTip');

        // 添加“留下足迹”的小交互，模拟用户反馈氛围（不强制跳转）
        if (shareTip) {
            shareTip.addEventListener('click', (e) => {
                e.preventDefault();
                // 创建一个临时提示（轻提示风格）
                const toast = document.createElement('div');
                toast.innerText = '✨ 感谢你的关注，欢迎留言交流～ ✨';
                toast.style.position = 'fixed';
                toast.style.bottom = '30px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.backgroundColor = '#2c3e50';
                toast.style.color = '#f5e7d9';
                toast.style.padding = '10px 22px';
                toast.style.borderRadius = '40px';
                toast.style.fontSize = '0.85rem';
                toast.style.fontWeight = '500';
                toast.style.backdropFilter = 'blur(10px)';
                toast.style.background = 'rgba(0,0,0,0.75)';
                toast.style.zIndex = '999';
                toast.style.boxShadow = '0 8px 20px rgba(0,0,0,0.2)';
                toast.style.letterSpacing = '0.3px';
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s';
                    setTimeout(() => toast.remove(), 350);
                }, 2000);
            });
        }

        // 给“进入网站”增加一点点动态跟踪效果（可选）
        if (enterButton) {
            enterButton.addEventListener('click', (e) => {
                // 可以在这里添加统计点，但保留原始跳转
                // 并且保证 href 正常跳转 login.html
                // 为了更顺滑，增加一点涟漪感（视觉效果）
                const ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.backgroundColor = 'rgba(255,255,255,0.5)';
                ripple.style.width = '10px';
                ripple.style.height = '10px';
                ripple.style.transform = 'scale(1)';
                ripple.style.pointerEvents = 'none';
                const rect = enterButton.getBoundingClientRect();
                ripple.style.left = `${rect.left + rect.width / 2}px`;
                ripple.style.top = `${rect.top + rect.height / 2}px`;
                ripple.style.position = 'fixed';
                ripple.style.transition = 'all 0.4s ease-out';
                ripple.style.opacity = '1';
                document.body.appendChild(ripple);
                requestAnimationFrame(() => {
                    ripple.style.transform = 'scale(30)';
                    ripple.style.opacity = '0';
                });
                setTimeout(() => ripple.remove(), 500);
                // 正常跳转，不阻止默认
            });
        }

        // 动态优化背景图片加载: 如果图片404 则提供友好背景（避免大面积空白）
        // 利用 Image 对象测试图片可访问性，若失败则动态追加备用样式
        const testImg = new Image();
        const bgUrl = './fccd46ce1656f5eab3962bd6fe31663767c89a5b7eece-M3OyhZ_fw658.webp';
        testImg.src = bgUrl;
        testImg.onerror = () => {
            // 图片加载失败时替换背景为暖色渐变，保证设计完整性
            document.body.style.background = "linear-gradient(125deg, #ffe9ce, #ffd9b5)";
            document.body.style.backgroundAttachment = "fixed";
            // 还可以微调卡片内背景适配
            const card = document.querySelector('.hero-card');
            if (card) {
                card.style.background = "rgba(255, 250, 240, 0.96)";
                card.style.backdropFilter = "blur(4px)";
            }
            console.log("背景图片未找到，已使用优雅降级配色");
        };

        // 为卡片增加动态计数器小彩蛋：点击统计数字更新?
        const statItems = document.querySelectorAll('.stat-item');
        // 一个有趣小彩蛋：连续点击“持续学习”三次显示隐藏消息
        let clickCount = 0;
        if (statItems[0]) {
            statItems[0].style.cursor = 'pointer';
            statItems[0].addEventListener('click', (e) => {
                clickCount++;
                if (clickCount === 3) {
                    const secretMsg = document.createElement('div');
                    secretMsg.innerText = '🎉 你也热爱学习！一起加油 🎉';
                    secretMsg.style.position = 'fixed';
                    secretMsg.style.bottom = '80px';
                    secretMsg.style.left = '50%';
                    secretMsg.style.transform = 'translateX(-50%)';
                    secretMsg.style.background = '#f06b1f';
                    secretMsg.style.color = 'white';
                    secretMsg.style.padding = '8px 18px';
                    secretMsg.style.borderRadius = '32px';
                    secretMsg.style.fontWeight = '500';
                    secretMsg.style.fontSize = '0.8rem';
                    secretMsg.style.zIndex = '999';
                    document.body.appendChild(secretMsg);
                    setTimeout(() => secretMsg.remove(), 1800);
                    clickCount = 0;
                } else {
                    // 轻提示
                    const hint = document.createElement('div');
                    hint.innerText = `📖 学习印记 +${clickCount}`;
                    hint.style.position = 'fixed';
                    hint.style.bottom = '80px';
                    hint.style.left = '50%';
                    hint.style.transform = 'translateX(-50%)';
                    hint.style.backgroundColor = 'rgba(0,0,0,0.6)';
                    hint.style.color = '#fff2e6';
                    hint.style.padding = '4px 12px';
                    hint.style.borderRadius = '30px';
                    hint.style.fontSize = '0.7rem';
                    hint.style.zIndex = '999';
                    document.body.appendChild(hint);
                    setTimeout(() => hint.remove(), 800);
                }
            });
        }

        // 平滑滚动 + 预加载优化 & 防止按钮重复点击过快（无副作用）
        // 针对移动端优化触摸响应
        if ('ontouchstart' in window) {
            document.body.style.touchAction = 'manipulation';
        }

        // 控制台输出暖心标语
        console.log("%c✨ 欢迎来到创造之境 | 记录前端成长的每一刻 ✨", "color: #f06b1f; font-size: 14px; font-weight: bold;");
        console.log("%c期待与你一起交流，共同成长。", "color: #2c3e50; font-size: 12px;");
    </script>
</body>

</html>
