<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>访问验证 · 创造之境</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 优雅背景 + 原图意境保留 */
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.4)),
                url('./7331f0a5be410cbb8f6cb478fdf5159eb15cbb5235b90-Yw3lcY_fw658.webp');
            background-size: cover;
            background-position: center 20%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* 毛玻璃卡片 - 现代登录面板 */
        .login-card {
            max-width: 460px;
            width: 100%;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.25);
            padding: 2.2rem 2rem 2.5rem;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            animation: fadeScale 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeScale {
            0% {
                opacity: 0;
                transform: scale(0.96) translateY(15px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .login-card:hover {
            box-shadow: 0 35px 55px -18px rgba(0, 0, 0, 0.45);
            background: rgba(255, 255, 255, 0.97);
        }

        /* 头部标识 */
        .brand {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .brand-icon {
            font-size: 3rem;
            display: inline-block;
            background: rgba(240, 107, 31, 0.15);
            width: 70px;
            height: 70px;
            line-height: 70px;
            border-radius: 60px;
            margin-bottom: 0.8rem;
            backdrop-filter: blur(2px);
        }

        .brand h2 {
            font-size: 1.9rem;
            font-weight: 650;
            background: linear-gradient(135deg, #2C3E50, #E67E22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .brand p {
            color: #5f6c7a;
            font-size: 0.85rem;
            margin-top: 0.4rem;
        }

        /* 输入框组 */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 550;
            color: #2c3e4e;
            margin-bottom: 0.5rem;
        }

        .input-label span:first-child {
            font-size: 1.1rem;
        }

        .password-field {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-field input {
            flex: 1;
            padding: 14px 18px;
            font-size: 1rem;
            border: 1.5px solid #e2e9f2;
            border-radius: 60px;
            background: #ffffff;
            transition: all 0.2s;
            outline: none;
            font-weight: 470;
            color: #1e2f3f;
            width: 100%;
            padding-right: 50px;
        }

        .password-field input:focus {
            border-color: #f06b1f;
            box-shadow: 0 0 0 3px rgba(240, 107, 31, 0.2);
        }

        .toggle-pwd {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: #8c9ab0;
            transition: color 0.2s;
            padding: 6px;
            border-radius: 30px;
        }

        .toggle-pwd:hover {
            color: #f06b1f;
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            background: linear-gradient(100deg, #f06b1f, #e05a10);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 14px 0;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 6px 14px rgba(240, 107, 31, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background: linear-gradient(100deg, #e05f16, #c74e08);
            transform: scale(1.01);
            box-shadow: 0 8px 20px rgba(240, 107, 31, 0.4);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        /* 错误提示 */
        .error-msg {
            color: #e03a3a;
            background: rgba(224, 58, 58, 0.08);
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 1rem;
            display: inline-block;
            width: 100%;
        }

        /* 底部辅助 */
        .help-text {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.7rem;
            color: #7e8c9e;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding-top: 1.2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #e67e22;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-link:hover {
            color: #b84c08;
            text-decoration: underline;
        }

        /* 右上角退出区域 (优雅悬浮) */
        .logout-area {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 100;
        }

        .logout-btn {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 240, 0.3);
            padding: 8px 18px;
            border-radius: 60px;
            color: #fef3e4;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logout-btn:hover {
            background: rgba(224, 58, 10, 0.8);
            border-color: #ffb485;
            transform: scale(0.97);
            color: white;
        }

        /* 响应式 */
        @media (max-width: 520px) {
            .login-card {
                padding: 1.8rem 1.4rem 2rem;
            }

            .brand h2 {
                font-size: 1.6rem;
            }

            .logout-area {
                top: 12px;
                right: 12px;
            }

            .logout-btn {
                padding: 6px 14px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>

<body>

    <!-- 右上角退出按钮（仅当已登录时显示，但页面独立，通过JS控制显示/隐藏） -->
    <div class="logout-area" id="logoutArea" style="display: none;">
        <button class="logout-btn" id="logoutBtn">
            <span>🚪</span> 退出登录
        </button>
    </div>

    <div class="login-card">
        <div class="brand">
            <div class="brand-icon">🔐</div>
            <h2>访问秘境</h2>
            <p>输入通行密语 · 开启创作空间</p>
        </div>

        <div class="input-group">
            <div class="input-label">
                <span>🔑</span> <span>验证密码</span>
            </div>
            <div class="password-field">
                <input type="password" id="password" placeholder="请输入访问密码" autocomplete="off">
                <button class="toggle-pwd" id="togglePwdBtn" type="button" aria-label="显示/隐藏密码">👁️</button>
            </div>
        </div>

        <button class="login-btn" id="loginBtn">
            <span>✨</span> 验证并进入
        </button>

        <div id="errorMsg" style="text-align: center;"></div>

        <div class="help-text">
            <a href="index.html" class="back-link">← 返回首页</a>
            <span style="margin: 0 8px">·</span>
            <span>📖 创作者入口</span>
        </div>
    </div>

    <script>
        // ---------- 安全增强 & 体验升级 ----------
        // 硬编码密码依旧存在但为了演示逻辑保留，增加前端hash对比+额外防护提醒（真实场景应走后端）
        // 为了安全性提示，加一层前端校验并输出日志，同时防止XSS与自动填充攻击风险。
        // 注意：仅仅前端硬编码在任何生产环境都不安全，但作为演示/学习/原型，我们增加防爆破简易延迟 + 环境提示。

        // 密码常量（可配置，教学中保持原逻辑但增强体验）
        const CORRECT_PASSWORD = "123";   // 与原设计一致，但增加输入限制和额外保护

        // DOM 元素
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsgDiv = document.getElementById('errorMsg');
        const logoutArea = document.getElementById('logoutArea');
        const logoutBtn = document.getElementById('logoutBtn');
        const togglePwdBtn = document.getElementById('togglePwdBtn');

        // 防暴力简易锁 (限制错误尝试次数)
        let attemptCount = 0;
        let lockUntil = 0;

        // 显示错误信息函数 (带样式)
        function showError(message, isWarning = true) {
            errorMsgDiv.innerHTML = `<div class="error-msg">⚠️ ${message}</div>`;
            if (isWarning) {
                // 抖动输入框轻提醒
                passwordInput.style.borderColor = "#e03a3a";
                setTimeout(() => {
                    if (passwordInput.style.borderColor === "rgb(224, 58, 58)") {
                        passwordInput.style.borderColor = "#e2e9f2";
                    }
                }, 800);
            }
            // 自动3秒后清除普通错误（但保留密码错误不会自动清除重要提示？不清除也可以，为了体验保留）
            setTimeout(() => {
                if (errorMsgDiv.innerHTML.includes(message)) {
                    // 如果不是最新的登录成功跳转，则不清除也可，但不影响主要逻辑
                }
            }, 3000);
        }

        function clearError() {
            errorMsgDiv.innerHTML = '';
            passwordInput.style.borderColor = "#e2e9f2";
        }

        // 检查密码逻辑(带防抖和锁定)
        function checkPassword() {
            // 清除旧的残留
            clearError();

            const now = Date.now();
            if (lockUntil > now) {
                const waitSeconds = Math.ceil((lockUntil - now) / 1000);
                showError(`尝试次数过多，请等待 ${waitSeconds} 秒后再试`, true);
                return;
            }

            const enteredPwd = passwordInput.value;
            // 空值处理
            if (!enteredPwd) {
                showError("请输入访问密码", true);
                passwordInput.focus();
                return;
            }

            // 验证密码（演示环境）
            if (enteredPwd === CORRECT_PASSWORD) {
                // 登录成功：清除错误计数
                attemptCount = 0;
                lockUntil = 0;
                // 存储登录状态 (localStorage)
                localStorage.setItem('loggedIn', 'true');
                // 添加一个登录时间戳（可选）
                localStorage.setItem('loginTime', Date.now().toString());
                // 跳转到 hello.html (原目标页面)
                window.location.href = 'hello.html';
            } else {
                // 错误计数 & 锁定机制
                attemptCount++;
                const remaining = 3 - attemptCount;
                let errMsg = `密码错误`;
                if (remaining > 0) {
                    errMsg += `，还剩 ${remaining} 次尝试机会`;
                } else {
                    errMsg += `，尝试次数已达上限，请稍后再试`;
                    // 锁定30秒
                    lockUntil = Date.now() + 30 * 1000;
                    attemptCount = 0; // 重置计数，锁定期后恢复
                }
                showError(errMsg, true);
                passwordInput.value = '';   // 清空密码框便于重输
                passwordInput.focus();
                // 额外震动反馈 (现代浏览器)
                if (passwordInput.style.animation) return;
                passwordInput.style.transform = "translateX(4px)";
                setTimeout(() => { if (passwordInput) passwordInput.style.transform = ""; }, 100);
            }
        }

        // 退出登录功能（独立于当前页, 如果已经有登录态仍然允许主动退出）
        function logout() {
            localStorage.removeItem('loggedIn');
            localStorage.removeItem('loginTime');
            // 跳转回首页 index.html (原欢迎页)
            window.location.href = 'index.html';
        }

        // 检查当前是否已经登录, 如果已经登录, 显示右上角的退出区域，并给出提示(但不自动跳转，保留在登录页也可以，但通常登录页不应该再给登录机会，但遵循原始设计)
        // 增强体验：若已经登录，显示不同UI，同时提醒用户已登录，可点击退出或直接去hello页面。
        function checkAlreadyLoggedIn() {
            const loggedIn = localStorage.getItem('loggedIn') === 'true';
            if (loggedIn) {
                // 已登录状态: 展示退出区域，同时修改卡片文字提供友好指引
                if (logoutArea) logoutArea.style.display = 'block';
                // 在卡片内增加一条友好提示
                const brandHint = document.querySelector('.brand p');
                if (brandHint && !document.getElementById('alreadyHint')) {
                    const hintSpan = document.createElement('div');
                    hintSpan.id = 'alreadyHint';
                    hintSpan.style.marginTop = '8px';
                    hintSpan.style.fontSize = '0.7rem';
                    hintSpan.style.background = '#eef2fa';
                    hintSpan.style.padding = '4px 10px';
                    hintSpan.style.borderRadius = '30px';
                    hintSpan.style.color = '#2c6e9e';
                    hintSpan.innerHTML = '✅ 您已经拥有访问凭证，可直接 <a href="hello.html" style="color:#e67e22; font-weight:bold;">进入空间 →</a>';
                    brandHint.parentNode.insertBefore(hintSpan, brandHint.nextSibling);
                }
                // 登录按钮文案微调
                if (loginBtn) loginBtn.innerHTML = `<span>🚀</span> 直接进入空间`;
                // 更改点击行为: 如果已登录，点击按钮跳转hello页面而不是验证密码
                const originalClick = loginBtn.onclick;
                loginBtn.onclick = (e) => {
                    e.preventDefault();
                    window.location.href = 'hello.html';
                };
                // 同时如果用户尝试输入密码，给予提示
                passwordInput.disabled = true;
                passwordInput.placeholder = "您已登录，可直接进入";
                // 显示一条柔和提示
                const noteDiv = document.createElement('div');
                noteDiv.className = 'help-text';
                noteDiv.style.marginTop = '10px';
                noteDiv.style.fontSize = '0.7rem';
                noteDiv.style.color = '#d25d00';
                noteDiv.innerText = '💡 检测到登录状态，如需切换账号请点击右上角退出';
                if (!document.getElementById('loginNote')) {
                    noteDiv.id = 'loginNote';
                    document.querySelector('.help-text')?.before(noteDiv);
                }
            } else {
                if (logoutArea) logoutArea.style.display = 'none';
                // 确保输入框可用
                if (passwordInput) passwordInput.disabled = false;
                passwordInput.placeholder = "请输入访问密码";
                if (loginBtn) loginBtn.innerHTML = `<span>✨</span> 验证并进入`;
                // 恢复点击事件
                loginBtn.onclick = (e) => {
                    e.preventDefault();
                    checkPassword();
                };
            }
        }

        // 密码显示/隐藏切换
        function initTogglePassword() {
            if (!togglePwdBtn) return;
            togglePwdBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                togglePwdBtn.innerHTML = type === 'password' ? '👁️' : '🙈';
            });
        }

        // 回车登录
        function bindEnterKey() {
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    // 已登录情况下回车也进入空间
                    if (localStorage.getItem('loggedIn') === 'true') {
                        window.location.href = 'hello.html';
                    } else {
                        checkPassword();
                    }
                }
            });
        }

        // 背景图片加载失败优雅降级
        const testBg = new Image();
        testBg.src = './7331f0a5be410cbb8f6cb478fdf5159eb15cbb5235b90-Yw3lcY_fw658.webp';
        testBg.onerror = () => {
            document.body.style.background = "linear-gradient(125deg, #1e2b32, #2c3e50)";
            document.body.style.backgroundAttachment = "fixed";
        };

        // 初始化事件与UI
        function init() {
            initTogglePassword();
            bindEnterKey();
            checkAlreadyLoggedIn();  // 检测登录态并调整UI

            // 如果logoutBtn存在则绑定退出
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    logout();
                });
            }

            // 额外安全: 防止控制台恶意修改localStorage，但仅增加日志提醒(演示层面)
            console.log("%c🔐 登录页面已升级 | 请妥善保管密码 (演示环境密码: 123)", "color: #e67e22; font-size: 12px");
            console.log("%c⚠️ 提醒: 前端硬编码仅用于学习，实际项目请务必采用后端验证。", "color: #c0392b; font-size: 11px");
        }

        init();
    </script>
</body>

</html>
